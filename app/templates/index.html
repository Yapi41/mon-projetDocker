<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail d'Innovation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #6c5ce7; border: none; }
        .btn-primary:hover { background-color: #a29bfe; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4">Inscription Projet</h2>
        
        {% if message %}
            <div class="alert alert-success text-center">{{ message }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" name="nom" class="form-control" placeholder="Jean-Noël Moulo" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Adresse Email</label>
                <input type="email" name="email" class="form-control" placeholder="nom@exemple.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Profession / Études</label>
                <select name="profession" class="form-select">
                    <option value="Etudiant">Étudiant (ING 3)</option>
                    <option value="Ingenieur">Ingénieur</option>
                    <option value="Developpeur">Développeur</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Message ou Motivation</label>
                <textarea name="message_text" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Envoyer ma candidature</button>
        </form>
    </div>
</div>

</body>
</html>
